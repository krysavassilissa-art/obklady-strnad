<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Obkladač Liberecký kraj | Ivo Strnad – obkladačské práce</title>
<meta name="description" content="Profesionální obkladačské práce v Libereckém kraji. 30 let praxe, koupelny, kuchyně, dlažba. Ivo Strnad – Jablonec nad Nisou.">

<style>
:root {
    --primary: #1f3a5f;
    --accent: #c89b3c;
    --light: #f5f5f5;
    --text: #333;
}

body {
    margin: 0;
    font-family: "Segoe UI", Roboto, Arial, sans-serif;
    color: var(--text);
    background: var(--light);
    line-height: 1.7;
}

h1, h2 { color: var(--primary); }

.container {
    max-width: 1100px;
    margin: auto;
    padding: 60px 20px;
}

/* HERO */
.hero {
    background:
        linear-gradient(rgba(31,58,95,0.75), rgba(31,58,95,0.75)),
        url('koupelna-1.jpeg') center/cover no-repeat;
    color: #fff;
    text-align: center;
    padding: 100px 20px;
}

.hero h1 {
    font-size: 38px;
    margin-bottom: 12px;
    color: #fff !important;
}

.hero p {
    font-size: 20px;
    max-width: 700px;
    margin: 0 auto 25px;
}

.hero a {
    background: var(--accent);
    color: #000;
    padding: 14px 32px;
    border-radius: 35px;
    font-weight: bold;
    text-decoration: none;
}

/* PROFIL */
.profile {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 35px;
}

.profile img {
    width: 100%;
    border-radius: 12px;
    cursor: pointer;
}

.claim {
    display: inline-block;
    background: var(--accent);
    padding: 8px 14px;
    font-weight: bold;
    margin-bottom: 12px;
}

/* USP */
.usp {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

/* SLUŽBY */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 22px;
}

.card {
    background: #fff;
    padding: 26px;
    border-radius: 10px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
}

/* GALERIE */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 18px;
    margin-top: 18px;
}

.gallery img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
}

/* BUTTON */
.btn-more {
    background: var(--accent);
    padding: 14px 28px;
    border-radius: 30px;
    font-weight: bold;
    border: none;
    cursor: pointer;
}

/* REFERENCE */
.references {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 22px;
    margin-top: 25px;
}

.reference-box {
    background: #fff;
    border-left: 5px solid var(--accent);
    padding: 22px;
    border-radius: 10px;
}

/* LIGHTBOX */
.lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

.lightbox.active { display: flex; }

.lightbox img {
    max-width: 90%;
    max-height: 85%;
}

/* ARROWS */
.lightbox-arrow {
    position: absolute;
    top: 50%;
    font-size: 40px;
    color: white;
    cursor: pointer;
}

.left { left: 20px; }
.right { right: 20px; }

/* KONTAKT */
.contact {
    background: var(--primary);
    color: white;
    text-align: center;
    padding: 70px 20px;
}

.contact a {
    color: white;
}

/* RESPONSIVE */
@media (max-width: 780px) {
    .profile {
        grid-template-columns: 1fr;
        text-align: center;
    }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <h1>Profesionální obkladačské práce</h1>
    <p>Více než 30 let zkušeností s obklady a dlažbou.</p>
    <a href="tel:+420723145168">📞 Zavolat</a>
</section>

<!-- O MNĚ -->
<section class="container">
<div class="profile">
<img src="ivo-strnad-obkladac.jpeg">
<div>
<div class="claim">30 let praxe</div>
<p>Jmenuji se Ivo Strnad...</p>

<div class="usp">
<div>✔️ Dlouholetá praxe</div>
<div>✔️ Pečlivé provedení</div>
<div>✔️ Férové ceny</div>
</div>
</div>
</div>
</section>

<!-- SLUŽBY -->
<section class="container">
<h2>Co nabízím</h2>
<div class="cards">
<div class="card">Obklady koupelen</div>
<div class="card">Kuchyně</div>
<div class="card">Dlažby</div>
</div>
</section>

<!-- DALŠÍ REALIZACE -->
<section class="container">
<h2>Další realizace a reference</h2>

<!-- TOP -->
<div class="gallery">
<img src="reference-11.jpg">
<img src="reference-7.jpg">
<img src="reference-8.jpg">
<img src="reference-9.jpg">
<img src="reference-10.jpg">
<img src="reference-6.jpg">
</div>

<div style="text-align:center;margin-top:30px;">
<button onclick="toggleGallery()" class="btn-more">
Zobrazit další realizace
</button>
</div>

<div id="moreGallery" style="display:none;">
<div class="gallery">
<img src="reference-12.jpg">
<img src="reference-13.jpg">
<img src="reference-1.jpg">
<img src="reference-2.jpg">
<img src="reference-3.jpg">
</div>
</div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
<span class="lightbox-arrow left">&#10094;</span>
<img src="">
<span class="lightbox-arrow right">&#10095;</span>
</div>

<script>
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const img = lightbox.querySelector("img");
let i = 0;

images.forEach((el, index)=>{
el.onclick=()=>{
i=index;
img.src=el.src;
lightbox.classList.add("active");
}
});

document.querySelector(".right").onclick=e=>{
e.stopPropagation();
i=(i+1)%images.length;
img.src=images[i].src;
};

document.querySelector(".left").onclick=e=>{
e.stopPropagation();
i=(i-1+images.length)%images.length;
img.src=images[i].src;
};

lightbox.onclick=()=>lightbox.classList.remove("active");

function toggleGallery(){
const g=document.getElementById("moreGallery");
g.style.display=g.style.display==="none"?"block":"none";
}
</script>

</body>
</html>
